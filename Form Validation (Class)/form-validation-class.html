<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Modelo</title>
  <link rel="stylesheet" href="./assets/css/form-validation-class.css">
</head>

<body>

  <section class="container">
    <h1>Form Register</h1>

    <form action="" id="form">

      <div class="name">
        <label for="name">Nome</label>
        <input type="text" id="name" class="beValidate">
      </div>

      <div class="surname">
        <label for="surname">Sobrenome</label>
        <input type="text" id="surname" class="beValidate">
      </div>

      <div class="cpf">
        <label for="cpf">CPF</label>
        <input type="text" id="cpf" class="beValidate">
      </div>

      <div class="user">
        <label for="user">Usuario</label>
        <input type="text" id="user" class="beValidate">
      </div>

      <div class="firstPassword">
        <label for="firstPassword">Senha</label>
        <input type="password" id="firstPassword" class="beValidate">
      </div>

      <div class="secondPassword">
        <label for="secondPassword">Nome</label>
        <input type="password" id="secondPassword" class="beValidate">
      </div>

      <button type="submit">Enviar</button>

    </form>
  </section>

  <script src="./assets/js/cpf-validator.js"></script>
  <script src="./assets/js/form-validation-class.js"></script>
</body>

</html>
